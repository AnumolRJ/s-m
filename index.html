<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎂</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        color: #fff;
        text-align: center;
    }

    .container {
        padding: 60px 20px;
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: 48px;
        margin-bottom: 10px;
    }

    .name {
        color: #ffd700;
    }

    .message {
        font-size: 18px;
        margin-bottom: 30px;
        color: #ddd;
    }

    .photo-box {
        margin: 30px auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        overflow: hidden;
        border: 5px solid #ffd700;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .footer {
        margin-top: 30px;
        font-size: 16px;
        color: #ccc;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 10px 20px;
        border-radius: 25px;
        background: #ffd700;
        color: #000;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #fff;
    }
</style>
```

</head>
<body>

<div class="container">

```
<h1>🎉 Happy Birthday <span class="name">Smrithi</span> 🎂</h1>

<p class="message">
    Wishing you a day filled with love, laughter, and unforgettable moments ❤️
</p>

<!-- Childhood Photo -->
<div class="photo-box">
    <img src="photo.jpg" alt="Childhood Photo">
</div>

<p class="footer">From someone who cares 💖</p>
```

</div>

</body>
</html>
